name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Repo çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Bağımlılıkları kur
        run: |
          pip install pyinstaller
          pip install -r requirements.txt

      - name: EXE oluştur
        run: |
          pyinstaller --onefile --noconsole --add-data "regions.json;." --add-data "sk_table.json;." mbc_kar_yuku_v2.py

      - name: EXE yükle
        uses: actions/upload-artifact@v4
        with:
          name: mbc-kar-yuku-exe
          path: dist/*.exe
